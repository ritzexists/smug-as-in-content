<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smug: as in content.</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%23268bd2;stop-opacity:1' /><stop offset='100%' style='stop-color:%23d33682;stop-opacity:1' /></linearGradient></defs><circle cx='50' cy='50' r='45' fill='%23002b36'/><text x='50' y='60' font-family='sans-serif' font-weight='900' font-size='30' text-anchor='middle' fill='url(%23g)'>smug:</text></svg>" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        background-color: #002b36;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .logo-container {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 120px;
        height: 120px;
      }
      .logo-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        animation: spin 20s linear infinite;
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .logo-main {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.75rem;
        font-weight: 900;
        letter-spacing: -0.05em;
        line-height: 1;
        background: linear-gradient(to bottom right, #268bd2, #d33682);
        -webkit-background-clip: text;
        color: transparent;
      }
      .logo-text {
        font-size: 10.5px;
        font-weight: 500;
        fill: #839496;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="logo-container">
          <svg viewBox="0 0 100 100" class="logo-svg">
            <path
              id="loaderTextPath"
              d="M 50, 50 m -35, 0 a 35,35 0 1,1 70,0 a 35,35 0 1,1 -70,0"
              fill="none"
            />
            <text class="logo-text">
              <textPath href="#loaderTextPath" startOffset="0%">
                as in content • as in content • as in content • 
              </textPath>
            </text>
          </svg>
          <div class="logo-main">smug:</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
